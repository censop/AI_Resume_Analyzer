 dont<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer | AWS Serverless</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden {
            display: none;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div class="max-w-6xl mx-auto py-12 px-4">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-2">AI Resume Analyser</h1>
            <p class="text-slate-600">Secure, Serverless Analysis powered by GPT-4o mini.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6">
                    <h3 class="text-sm font-semibold mb-4 text-slate-500 uppercase tracking-wider">Resume Content</h3>
                    <textarea id="resume-text" class="w-full h-48 p-4 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="Paste your resume text here..."></textarea>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6">
                    <h3 class="text-sm font-semibold mb-4 text-slate-500 uppercase tracking-wider">Target Job Description</h3>
                    <textarea id="jd-text" class="w-full h-48 p-4 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="Paste the job requirements here..."></textarea>
                </div>
            </div>
        </div>

        <div id="progress-container" class="mb-8 hidden">
            <div class="flex justify-between mb-2">
                <span id="status-text" class="text-sm font-bold text-blue-600 uppercase tracking-wide">Initializing...</span>
                <span id="progress-percent" class="text-sm font-bold text-blue-600">0%</span>
            </div>
            <div class="w-full bg-slate-200 rounded-full h-3">
                <div id="progress-bar" class="bg-blue-600 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <div class="text-center mb-12">
            <button id="analyze-btn" onclick="handleStartAnalysis()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-12 rounded-full shadow-lg transition-all transform hover:scale-105 active:scale-95">
                Analyze Alignment
            </button>
        </div>

        <section id="results-section" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-slate-800 mb-4 flex items-center text-lg">📋 Requirements Match</h3>
                    <ul id="requirements-list" class="space-y-3 text-slate-600 text-sm"></ul>
                </div>
                <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-slate-800 mb-4 flex items-center text-lg">📈 Strategic Improvements</h3>
                    <div id="metrics-content" class="text-slate-600 text-sm leading-relaxed"></div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const LAMBDA_URL = "https://dbme353lxf7lohp2dh62ah2wwy0ylctq.lambda-url.us-east-1.on.aws/";
        const UPLOAD_BUCKET = "resume-analyzer-file-upload-bucket";

        async function handleStartAnalysis() {
            const resumeText = document.getElementById('resume-text').value;
            const jdText = document.getElementById('jd-text').value;

            if (!resumeText || !jdText) return alert("Please paste both your Resume and the Job Description.");

            const combinedText = `--- TARGET JOB DESCRIPTION ---\n${jdText}\n\n--- RESUME CONTENT ---\n${resumeText}`;
            const resumeBlob = new Blob([combinedText], { type: 'text/plain' });

            document.getElementById('analyze-btn').disabled = true;
            document.getElementById('progress-container').classList.remove('hidden');
            document.getElementById('results-section').classList.add('hidden');
            updateProgress("Requesting secure upload...", 20);

            try {
                const response = await fetch(LAMBDA_URL, { method: 'POST' });
                const { uploadUrl, downloadUrl } = await response.json();

                updateProgress("Uploading to S3...", 50);

                await fetch(uploadUrl, {
                    method: 'PUT',
                    body: resumeBlob,
                    headers: {
                        'Content-Type': 'text/plain'
                    }
                });

                updateProgress("AI Analysis in progress...", 80);

                pollForResults(downloadUrl);

            } catch (err) {
                console.error(err);
                alert("Error during process. Check console.");
                resetUI();
            }
        }

        function updateProgress(text, percent) {
            document.getElementById('status-text').innerText = text;
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-percent').innerText = percent + '%';
        }

        function resetUI() {
            document.getElementById('analyze-btn').disabled = false;
            document.getElementById('progress-container').classList.add('hidden');
        }

        async function pollForResults(downloadUrl) {
            let attempts = 0;
            const maxAttempts = 20;

            const interval = setInterval(async () => {
                attempts++;
                updateProgress(`AI thinking... (Step ${attempts})`, 85);

                try {
                    const response = await fetch(downloadUrl);
                    if (response.ok) {
                        const data = await response.json();
                        clearInterval(interval);
                        renderResults(data);
                    }
                } catch (err) {
                    console.log("Result not ready yet...");
                }

                if (attempts >= maxAttempts) {
                    clearInterval(interval);
                    alert("AI took too long. Check S3 results folder!");
                    resetUI();
                }
            }, 3000);
        }

        function renderResults(data) {
            updateProgress("Analysis Complete!", 100);
            document.getElementById('results-section').classList.remove('hidden');
            document.getElementById('analyze-btn').disabled = false;

            document.getElementById('metrics-content').innerHTML = `
                        <div class="text-3xl font-bold text-blue-600 mb-2">${data.match_score}% Match</div>
                        <p class="text-slate-700">${data.improvements}</p>
                    `;

            const list = document.getElementById('requirements-list');
            list.innerHTML = data.key_requirements.map(req =>
                `<li class="flex items-center">
                            <span class="text-green-500 mr-2">✔</span> ${req}
                        </li>`
            ).join('');
        }
    </script>
</body>
</html>
